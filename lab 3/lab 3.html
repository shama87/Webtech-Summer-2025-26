<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pental Shop Lab-3</title>
    <link rel="stylesheet" href="lab 3.css">
</head>
<body>
 
 
    <h1>Welcome to Pental Shop Lab-3</h1>
 
    <h2>About This Lab</h2>
 
    <p>
        In this lab, you will learn basic HTML structure,
        formatting text, creating simple tables,
        and using forms for input.
    </p>
 
    <table border="1">
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Status</th>
            
        </tr>
        <tr>
            <td>Pencil</td>
            <td>100</td>
            <td>In stock</td>
            
        </tr>
        <tr>
            <td>Notebooks</td>
            <td>50</td>
            <td>Low Stock</td>
            
        <tr>
            <td>Markers</td>
            <td>15</td>
            <td>In Stock</td>
        </tr> </br>   

    </table>    

        <div class="contact-card">
            <h2 class="form-title">Contact Information</h2>
            
            <form>
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name">
                </div>
                
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                
                <div class="form-row alignment-top">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="3"></textarea>
                </div>
            </form>
        </div>
       
 
   

 </body>
 </html>
